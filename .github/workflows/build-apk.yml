name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Inject Valid Mock Google Services Configuration
      run: |
        mkdir -p app/src/debug
        cat << 'EOF' > app/google-services.json
        {
          "project_info": {
            "project_number": "1234567890",
            "project_id": "mock-project-id",
            "storage_bucket": "mock-project-id.appspot.com"
          },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "1:1234567890:android:mockappid",
                "android_client_info": {
                  "package_name": "com.aistudio.capcutsuite.abccde"
                }
              },
              "oauth_client": [],
              "api_key": [
                {
                  "current_key": "mock_api_key_placeholder"
                }
              ],
              "services": {
                "appinvite_service": {
                  "other_platform_oauth_client": []
                }
              }
            }
          ],
          "configuration_version": "1"
        }
        EOF
        cp app/google-services.json app/src/debug/google-services.json

    - name: Generate Dummy Debug Keystore di Root Proyek
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Build APK Tanpa Gradlew Bawaan
      run: gradle assembleDebug --no-daemon

    - name: Upload APK Hasil Build
      uses: actions/upload-artifact@v4
      with:
        name: CapCut-Suite-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
