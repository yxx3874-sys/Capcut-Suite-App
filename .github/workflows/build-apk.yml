name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Bypass Google Services Configuration
      run: |
        mkdir -p app/src/debug
        echo '{}' > app/google-services.json
        echo '{}' > app/src/debug/google-services.json

    - name: Generate Dummy Debug Keystore
      run: |
        keytool -genkey -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Build APK Tanpa Gradlew Bawaan
      run: gradle assembleDebug --no-daemon

    - name: Upload APK Hasil Build
      uses: actions/upload-artifact@v4
      with:
        name: CapCut-Suite-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
